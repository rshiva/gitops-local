name: Push to ECR and Deploy to EKS
on:
  pull_request:
    branches:
      - main
    types: [closed]

permissions:
  id-token: write
  contents: read

jobs:
  build-push:
    if: ${{ github.event.pull_request.merged == true }}
    runs-on: ubuntu-latest
    outputs:
      image-tag: ${{ steps.set-tag.outputs.value}}

    steps:
      - name: checkout
        uses: actions/checkout@v4
      - run: echo "The PR was successfully merged!"

      - name: set image tag
        id: set-tag
        run: echo "value=${{ github.sha }}" >> $GITHUB_OUTPUT

      - name: Login to Docker Hub
        id: login-dockerhub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push to docker hub
        env:
          IMAGE_TAG: ${{ github.sha }}
        run: |
            docker build \
            -t ${{ secrets.DOCKERHUB_USERNAME }}/devopsrt-homelab-local:$IMAGE_TAG \
            -t ${{ secrets.DOCKERHUB_USERNAME }}/devopsrt-homelab-local:latest \
            ./app
            docker push ${{ secrets.DOCKERHUB_USERNAME }}/devopsrt-homelab-local:$IMAGE_TAG
            docker push ${{ secrets.DOCKERHUB_USERNAME }}/devopsrt-homelab-local:latest


      # kustomize is not pre-installed on ubuntu-latest; install it explicitly
      # so `kustomize edit set image` is available in the deploy step
      - name: Install kustomize
        uses: imranismail/setup-kustomize@v2

      - name: Deploy to local
        env:
          IMAGE_TAG: ${{ github.sha }}
        run: |
          # aws eks update-kubeconfig \
          #   --region ap-south-1 \
          #   --name devopsrt-homelab-dev-eks-cluster

          cd k8s/overlays/local


          kustomize edit set image \
            python-dynamo-lab-app-image=${{ secrets.DOCKERHUB_USERNAME }}/devopsrt-homelab-local:$IMAGE_TAG

          git config user.email "ci@github.com"
          git config user.name "Github Actions"
          git add  kustomization.yaml
          git commit -m "ci: update image tag to $IMAGE_TAG"
          git push

          # kubectl apply -k .

          # # Deployment name matches base (python-dynamo-lab-app); namePrefix was removed from the overlay.
          # # Namespace matches overlays/dev/kustomization.yaml namespace field.
          # kubectl rollout status deployment/python-dynamo-lab-app \
          #   -n python-dynamo-lab \
          #   --timeout=180s
