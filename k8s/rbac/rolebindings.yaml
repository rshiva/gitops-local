#alice -> deploy-editor
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: alice-deploy-editor
  namespace: python-dynamo-lab
subjects:
- kind: ServiceAccount
  name: alice
  namespace: python-dynamo-lab
roleRef:
  kind: Role
  name: deploy-editor
  apiGroup: rbac.authorization.k8s.io

---
#bob -> deploy-viewer
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: bob-deploy-viewer
  namespace: python-dynamo-lab
subjects:
- kind: ServiceAccount
  name: bob
  namespace: python-dynamo-lab
roleRef:
  kind: Role
  name: deploy-viewer
  apiGroup: rbac.authorization.k8s.io
