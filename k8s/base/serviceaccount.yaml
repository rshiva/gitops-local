# yaml-language-server: $schema=kubernetes
apiVersion: v1
kind: ServiceAccount
metadata:
  name: python-dynamo-lab-sa
  namespace: python-dynamo-lab
  annotations:
    # IRSA: must be an IAM role ARN, not an EKS cluster ARN.
    # Replace with the role ARN output from the Terraform IRSA module.
    eks.amazonaws.com/role-arn: arn:aws:iam::640565834670:role/python-dynamo-lab-irsa-role
