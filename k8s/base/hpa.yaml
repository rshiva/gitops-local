apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: python-dynamo-lab-app-hpa
  namespace: python-dynamo-lab
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: python-dynamo-lab-app
  minReplicas: 2
  maxReplicas: 10
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 60
