apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: python-dyno-lab-dev
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/rshiva/Gitops-kubernetes-Homelab
    targetRevision: main
    path: k8s/overlays/dev
  destination:
    server: https://kubernetes.default.svc
    namespace: python-dynamo-lab
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
